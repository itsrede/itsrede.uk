<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsRede Clicker</title>
    <style>
        :root { --rede-red: #ff0000; --rede-blue: #4d94ff; }
        body { margin: 0; font-family: 'Comic Sans MS', cursive; overflow: hidden; height: 100vh; background: #000; color: white; user-select: none; }

        /* Moving Diagonal Background from image_da6700.png */
        .game-area {
            flex-grow: 1; height: 100vh;
            background: repeating-linear-gradient(45deg, var(--rede-red), var(--rede-red) 60px, var(--rede-blue) 60px, var(--rede-blue) 120px);
            background-size: 200% 200%; animation: moveBg 15s linear infinite;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 100% 100%; } }

        /* HUD & Stats */
        .header { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 10px; text-align: center; border-bottom: 4px solid #222; z-index: 100; }
        #score { font-size: 48px; margin: 0; }
        #rps { color: var(--rede-red); font-size: 14px; font-weight: bold; }

        /* Left Side Menu (Styled per image_da6700.png) */
        .left-menu { position: absolute; left: 20px; top: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
        .menu-btn { 
            background: white; color: black; border: 4px solid black; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 10px; font-size: 18px;
        }
        .menu-btn:hover { transform: scale(1.1); background: var(--rede-red); color: white; }

        /* Scrolling Shop System */
        .shop {
            position: absolute; right: 20px; top: 110px; bottom: 30px; width: 280px;
            background: rgba(0,0,0,0.85); border: 3px solid white; border-radius: 15px;
            padding: 15px; overflow-y: auto; z-index: 50; scrollbar-width: thin;
        }
        .shop::-webkit-scrollbar { width: 6px; }
        .shop::-webkit-scrollbar-thumb { background: white; border-radius: 10px; }

        .shop-item {
            background: #1a1a1a; border: 2px solid white; border-radius: 8px;
            padding: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .shop-item:hover { background: #333; transform: translateX(-5px); }
        .shop-item.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .shop-item h4 { margin: 0; font-size: 14px; color: var(--rede-blue); }
        .shop-item p { margin: 5px 0 0; font-size: 12px; color: #ffeb3b; }

        /* Mascot */
        #clicker-btn { width: 240px; cursor: pointer; z-index: 10; transition: transform 0.05s; }
        #clicker-btn:active { transform: scale(0.9); }

        /* Save Tag */
        .save-status { position: absolute; bottom: 20px; left: 20px; font-size: 22px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div class="header">
        <div id="score">0</div>
        <div id="rps">REDE PER SECOND: 0</div>
    </div>

    <div class="game-area">
        <div class="left-menu">
            <div class="menu-btn">Background 🎨</div>
            <div class="menu-btn" onclick="alert('Use Code: REDE2026')">Codes 🔑</div>
            <div class="menu-btn">Music (WIP) 🎵</div>
        </div>

        <!-- Reference to mascot mentioned in image_da6700.png -->
        <img src="favicon.png" id="clicker-btn" alt="Rede Mascot">

        <div class="shop" id="shop-container">
            <h3 style="text-align:center; margin-top:0;">REDE SHOP 🛒</h3>
        </div>

        <div class="save-status">Save progress 💾</div>
    </div>

    <script>
        // Core Variables
        let score = parseFloat(localStorage.getItem('r_score')) || 0;
        let pwr = parseInt(localStorage.getItem('r_pwr')) || 1;
        let rps = parseFloat(localStorage.getItem('r_rps')) || 0;
        let lastSafeScore = score;

        // 40 Unique Career Items
        const names = [
            "Mouse Click", "Double Tap", "Shorts Bot", "Gumball Clip", "Breakcore Loop", 
            "PC Upgrade", "Rede Records", "Viral Hook", "King's Crown", "Pro Studio",
            "Minutes2cool Master", "Zorts Remix", "Outcast Anthem", "Roblox Scripting", "UGC Designer",
            "GitHub Pages Pro", "Cloudflare Shield", "itsrede.uk Launch", "Sub Milestone", "Retention God",
            "Analog Horror Clip", "Distortion Pedal", "Amen Break Pack", "Bass Boost", "Synths for Success",
            "Nitro Type Gold", "Copper Golem Hoodie", "Purple Heart Cape", "Gaming Chair", "Dual Monitors",
            "Terming Gods X HQ", "Digital Safety Org", "Brand Ambassador", "Merch Drop", "Red Simple T-Shirt",
            "World Tour", "Stadium Show", "Billboard Hit", "Grammy Winner", "Internet Legend"
        ];

        const emojis = ["🖱️", "👆", "🎥", "🐱", "🥁", "💻", "🏢", "🪝", "👑", "🎙️", "💿", "🎵", "🎸", "🧱", "🎨", "🌐", "☁️", "🚀", "📈", "🔥", "📺", "📻", "🥁", "🔉", "🎹", "🏁", "🤖", "💜", "💺", "🖥️", "🛡️", "👮", "🤝", "👕", "🔴", "🌍", "🏟️", "📊", "🏆", "🌟"];

        const items = [];
        for(let i = 0; i < 40; i++) {
            items.push({
                name: names[i],
                type: i % 3 === 0 ? "click" : "rps",
                cost: Math.floor(15 * Math.pow(1.5, i)),
                boost: Math.floor(1 * Math.pow(1.4, i)),
                emoji: emojis[i]
            });
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '<h3 style="text-align:center; margin-top:0;">REDE SHOP 🛒</h3>';
            
            items.forEach((item, index) => {
                // Progression Logic: Only show if they have 70% of the cost or it's the start
                const canSee = score >= (item.cost * 0.7) || index < 3;
                if (canSee) {
                    const btn = document.createElement('div');
                    const affordable = score >= item.cost;
                    btn.className = `shop-item ${!affordable ? 'locked' : ''}`;
                    btn.innerHTML = `
                        <h4>${item.emoji} ${item.name}</h4>
                        <p>Cost: ${Math.floor(item.cost).toLocaleString()} | +${item.boost} ${item.type.toUpperCase()}</p>
                    `;
                    if (affordable) btn.onclick = () => buyItem(index);
                    container.appendChild(btn);
                }
            });
        }

        function buyItem(idx) {
            const item = items[idx];
            if (score >= item.cost) {
                score -= item.cost;
                if (item.type === 'click') pwr += item.boost;
                else rps += item.boost;
                item.cost *= 1.3; 
                save();
            }
        }

        function save() {
            localStorage.setItem('r_score', score);
            localStorage.setItem('r_pwr', pwr);
            localStorage.setItem('r_rps', rps);
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('rps').innerText = `REDE PER SECOND: ${rps.toFixed(1)}`;
            renderShop();
        }

        // Anti-Cheat Loop
        setInterval(() => {
            // If score jumps more than 2 million in 100ms, it's likely a console cheat
            if (score > lastSafeScore + 2000000) {
                score = parseFloat(localStorage.getItem('r_score')) || 0;
                alert("Anti-Cheat: Resetting to last legitimate save!");
            }
            score += rps / 10;
            save();
            lastSafeScore = score;
        }, 100);

        document.getElementById('clicker-btn').onclick = () => {
            score += pwr;
            save();
        };

        // Extra Anti-Cheat: Disable Right Click and F12
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => { if(e.keyCode == 123) return false; };

        renderShop();
        save();
    </script>
</body>
</html>
