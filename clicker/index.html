<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Clicker | itsrede.uk</title>
    <style>
        :root {
            --bg-speed: 20s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }

        /* Moving Red and Blue Striped Background */
        .game-area {
            flex-grow: 1;
            background: repeating-linear-gradient(
                45deg,
                #ff4d4d,
                #ff4d4d 50px,
                #4d94ff 50px,
                #4d94ff 100px
            );
            background-size: 200% 200%;
            animation: moveBg var(--bg-speed) linear infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* Top Header */
        .header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 10;
            border-bottom: 3px solid #333;
        }
        #score { font-size: 36px; font-weight: bold; color: #fff; text-shadow: 2px 2px #000; }
        #rps { font-size: 18px; color: #ff4d4d; margin-top: 5px; }

        /* Mascot Container with Idle Shake */
        .mascot-container {
            position: relative;
            z-index: 5;
            animation: idleShake 0.5s ease-in-out infinite alternate;
        }

        @keyframes idleShake {
            from { transform: translate(-2px, 0); }
            to { transform: translate(2px, 0); }
        }

        #clicker-btn {
            width: 220px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }

        /* Spin Class added via JS */
        .spin {
            animation: spinClick 0.4s ease-out;
        }

        @keyframes spinClick {
            0% { transform: scale(0.8) rotate(0deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Gradient Buttons */
        .right-menu {
            position: absolute;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .menu-btn {
            background: linear-gradient(270deg, #ff0000, #000000, #4d94ff);
            background-size: 600% 600%;
            animation: gradientShift 4s ease infinite;
            color: white;
            border: 2px solid #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            min-width: 150px;
            text-shadow: 1px 1px #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-btn:hover { transform: translateX(-5px); }
        .menu-btn:active { transform: scale(0.95); }

        /* Floating Numbers */
        .plus-one {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            z-index: 15;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="score">0</div>
        <div id="rps">Rede per second: 0</div>
    </div>

    <div class="game-area">
        <div class="mascot-container">
            <img src="/favicon.png" id="clicker-btn" alt="Rede Mascot">
        </div>

        <div class="right-menu">
            <button class="menu-btn" onclick="buyUpgrade('click')">Power Up (<span id="click-cost">10</span>)</button>
            <button class="menu-btn" onclick="buyUpgrade('auto')">Auto-Prod (<span id="auto-cost">50</span>)</button>
            <button class="menu-btn" onclick="alert('Codes: REDE2026')">Codes</button>
            <button class="menu-btn" onclick="resetGame()" style="font-size: 10px; margin-top: 20px; opacity: 0.5;">WIPE DATA</button>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('rede_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('rede_power')) || 1;
        let autoValue = parseInt(localStorage.getItem('rede_auto')) || 0;

        const scoreEl = document.getElementById('score');
        const rpsEl = document.getElementById('rps');
        const btn = document.getElementById('clicker-btn');

        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            rpsEl.innerText = `Rede per second: ${autoValue}`;
            document.getElementById('click-cost').innerText = Math.floor(10 * Math.pow(1.5, clickPower - 1));
            document.getElementById('auto-cost').innerText = Math.floor(50 * Math.pow(1.5, autoValue));
            
            localStorage.setItem('rede_score', score);
            localStorage.setItem('rede_power', clickPower);
            localStorage.setItem('rede_auto', autoValue);
        }

        btn.addEventListener('click', (e) => {
            score += clickPower;
            
            // Trigger Spin
            btn.classList.remove('spin');
            void btn.offsetWidth; // Trigger reflow to restart animation
            btn.classList.add('spin');

            createPlusOne(e.clientX, e.clientY);
            updateUI();
        });

        function buyUpgrade(type) {
            if (type === 'click') {
                let cost = Math.floor(10 * Math.pow(1.5, clickPower - 1));
                if (score >= cost) {
                    score -= cost;
                    clickPower++;
                }
            } else if (type === 'auto') {
                let cost = Math.floor(50 * Math.pow(1.5, autoValue));
                if (score >= cost) {
                    score -= cost;
                    autoValue++;
                }
            }
            updateUI();
        }

        function createPlusOne(x, y) {
            const plus = document.createElement('div');
            plus.className = 'plus-one';
            plus.innerText = `+${clickPower}`;
            plus.style.left = x + 'px';
            plus.style.top = y + 'px';
            document.body.appendChild(plus);

            let opacity = 1;
            let currentY = y;
            const anim = setInterval(() => {
                currentY -= 3;
                opacity -= 0.04;
                plus.style.top = currentY + 'px';
                plus.style.opacity = opacity;
                if (opacity <= 0) {
                    clearInterval(anim);
                    plus.remove();
                }
            }, 30);
        }

        setInterval(() => {
            if (autoValue > 0) {
                score += (autoValue / 10);
                updateUI();
            }
        }, 100);

        function resetGame() {
            if(confirm("Wipe all progress?")) {
                localStorage.clear();
                location.reload();
            }
        }

        updateUI();
    </script>
</body>
</html>
