<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Clicker | itsrede.uk</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Header Stats */
        .header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #333;
        }
        #score { font-size: 32px; font-weight: bold; margin: 0; }
        #rps { font-size: 16px; color: #bbb; margin-top: 5px; }

        /* Main Game Area */
        .game-area {
            flex-grow: 1;
            background: repeating-linear-gradient(
                90deg,
                #9cdbff,
                #9cdbff 40px,
                #7ecbff 40px,
                #7ecbff 80px
            );
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sunburst effect behind mascot */
        .sunburst {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            z-index: 1;
        }

        /* The Mascot Clicker */
        #clicker-btn {
            width: 180px;
            height: auto;
            z-index: 2;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
            user-select: none;
        }
        #clicker-btn:active { transform: scale(0.9); }

        /* Right Side Menu */
        .right-menu {
            position: absolute;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 3;
        }

        .menu-btn {
            background: #000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            min-width: 120px;
            box-shadow: 2px 2px 0px #444;
        }
        .menu-btn:hover { background: #222; }

        .shop-btn {
            background: #222;
            font-size: 20px;
            padding: 10px 20px;
            margin-top: 10px;
        }

        /* Top Right Icons */
        .icon-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .circle-icon {
            background: black;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="score">0</div>
        <div id="rps">Rede per second: 0</div>
    </div>

    <div class="game-area">
        <div class="sunburst"></div>
        
        <img src="/favicon.png" id="clicker-btn" alt="Rede Mascot">

        <!-- Top Icons like in image_dbc111.png -->
        <div class="icon-bar">
            <div class="circle-icon">🔊</div>
            <div class="circle-icon">🖌️</div>
            <div class="circle-icon">?</div>
            <div class="circle-icon">📊</div>
            <div class="circle-icon">i</div>
        </div>

        <!-- Right Side Menu -->
        <div class="right-menu">
            <button class="menu-btn" onclick="alert('World Record coming soon!')">World Record</button>
            <button class="menu-btn" onclick="alert('Follow @itsredeofficial for rewards!')">Free Rewards</button>
            <button class="menu-btn" onclick="openShop()">Power Ups</button>
            <button class="menu-btn">Achievements</button>
            <button class="menu-btn">Codes</button>
            <button class="menu-btn shop-btn" onclick="openShop()">SHOP</button>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('rede_score')) || 0;
        let autoValue = parseInt(localStorage.getItem('rede_auto')) || 0;
        let clickPower = 1;

        const scoreEl = document.getElementById('score');
        const rpsEl = document.getElementById('rps');
        const btn = document.getElementById('clicker-btn');

        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            rpsEl.innerText = `Rede per second: ${autoValue}`;
            localStorage.setItem('rede_score', score);
        }

        btn.addEventListener('click', (e) => {
            score += clickPower;
            updateUI();
            createPlusOne(e.clientX, e.clientY);
        });

        // Floating +1 effect
        function createPlusOne(x, y) {
            const plus = document.createElement('div');
            plus.innerText = `+${clickPower}`;
            plus.style.position = 'absolute';
            plus.style.left = x + 'px';
            plus.style.top = y + 'px';
            plus.style.color = 'white';
            plus.style.fontWeight = 'bold';
            plus.style.pointerEvents = 'none';
            plus.style.zIndex = '10';
            document.body.appendChild(plus);

            let opacity = 1;
            const anim = setInterval(() => {
                y -= 2;
                opacity -= 0.05;
                plus.style.top = y + 'px';
                plus.style.opacity = opacity;
                if (opacity <= 0) {
                    clearInterval(anim);
                    plus.remove();
                }
            }, 50);
        }

        setInterval(() => {
            if (autoValue > 0) {
                score += (autoValue / 10);
                updateUI();
            }
        }, 100);

        function openShop() {
            // This is where you can trigger a popup for upgrades
            alert("Shop feature: Buy 'YouTube Shorts Bot' or 'Rede Records Intern' coming next!");
        }

        updateUI();
    </script>
</body>
</html>
