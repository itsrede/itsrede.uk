<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsRede Clicker Game</title>
    <style>
        :root { --rede-red: #ff0000; --rede-blue: #4d94ff; --rede-gold: #ffd700; }
        body { margin: 0; font-family: 'Comic Sans MS', cursive; overflow: hidden; height: 100vh; background: #000; color: white; user-select: none; }

        /* Moving Background */
        .game-area {
            flex-grow: 1; height: 100vh;
            background: repeating-linear-gradient(45deg, var(--rede-red), var(--rede-red) 60px, var(--rede-blue) 60px, var(--rede-blue) 120px);
            background-size: 200% 200%; animation: moveBg 15s linear infinite;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 100% 100%; } }

        /* HUD & Top Bar */
        .header { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 10px; text-align: center; border-bottom: 4px solid #000; z-index: 100; }
        #score { font-size: 56px; margin: 0; font-weight: bold; text-shadow: 3px 3px #000; }
        .stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 5px; }
        #rps { color: var(--rede-red); font-size: 16px; font-weight: bold; }
        #click-strength { color: #00ff00; font-size: 16px; font-weight: bold; }

        /* Left Side Menu */
        .left-menu { position: absolute; left: 20px; top: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
        .menu-btn { 
            background: white; color: black; border: 4px solid black; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 10px; font-size: 18px; box-shadow: 4px 4px 0px #000;
        }
        .menu-btn:hover { transform: scale(1.05); background: var(--rede-red); color: white; }

        /* Rebirth Button (Bottom Left) */
        .rebirth-container { position: absolute; bottom: 60px; left: 20px; z-index: 60; display: flex; flex-direction: column; gap: 5px; }
        #rebirth-btn {
            background: #000; color: var(--rede-gold); border: 3px solid var(--rede-gold);
            padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-size: 20px; text-transform: uppercase;
        }
        #rebirth-btn:hover { background: var(--rede-gold); color: #000; transform: translateY(-3px); }
        #rebirth-btn.ready { animation: pulseGold 1.5s infinite; }
        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }

        /* Shop System */
        .shop {
            position: absolute; right: 20px; top: 110px; bottom: 30px; width: 280px;
            background: rgba(0,0,0,0.9); border: 3px solid white; border-radius: 15px;
            padding: 15px; overflow-y: auto; z-index: 50;
        }
        .shop-item {
            background: #111; border: 2px solid #444; border-radius: 8px;
            padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.1s;
        }
        .shop-item:hover:not(.locked) { background: #222; border-color: white; transform: translateX(-5px); }
        .shop-item.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .shop-item h4 { margin: 0; font-size: 16px; color: var(--rede-blue); text-transform: uppercase; pointer-events: none; }
        .shop-item p { margin: 5px 0 0; font-size: 13px; color: #ffeb3b; font-weight: bold; pointer-events: none; }

        /* Mascot Icon with Spin Effect */
        #clicker-btn { 
            width: 260px; height: 260px; cursor: pointer; z-index: 10; 
            transition: transform 0.1s; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            object-fit: contain;
        }
        #clicker-btn:active { transform: scale(0.92); }

        .spinning { animation: spinMascot 0.4s ease-out; }
        @keyframes spinMascot {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.15) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Save Status */
        .save-status { position: absolute; bottom: 20px; left: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <div id="score">0</div>
        <div class="stats-row">
            <div id="click-strength">CLICK STRENGTH: 1</div>
            <div id="rps">REDE PER SECOND: 0.0</div>
        </div>
    </div>

    <div class="game-area">
        <div class="left-menu">
            <div class="menu-btn">Background 🎨</div>
            <div class="menu-btn" onclick="alert('CODE: REDE2026')">Codes 🔑</div>
            <div class="menu-btn">Music (WIP) 🎵</div>
        </div>

        <img src="favicon.png" id="clicker-btn" alt="Rede Mascot" onerror="this.src='https://itsrede.uk/favicon.png'">

        <div class="rebirth-container">
            <button id="rebirth-btn" onclick="attemptRebirth()">Rebirth</button>
            <div id="rebirth-cost" style="font-size: 12px; color: var(--rede-gold); text-align: center;">Cost: 1M</div>
        </div>

        <div class="shop" id="shop-container">
            <h3 style="text-align:center; margin-top:0;">REDE SHOP 🛒</h3>
        </div>

        <div class="save-status">Save progress 💾</div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('r_score')) || 0;
        let pwr = parseInt(localStorage.getItem('r_pwr')) || 1;
        let rps = parseFloat(localStorage.getItem('r_rps')) || 0;
        let rebirths = parseInt(localStorage.getItem('r_rebirths')) || 0;
        let lastSafeScore = score;

        const names = [
            "Mouse Click", "Double Tap", "Shorts Bot", "Gumball Clip", "Breakcore Loop", 
            "PC Upgrade", "Rede Records", "Viral Hook", "King's Crown", "Pro Studio",
            "Minutes2cool Master", "Zorts Remix", "Outcast Anthem", "Roblox Scripting", "UGC Designer",
            "GitHub Pages Pro", "Cloudflare Shield", "itsrede.uk Launch", "Sub Milestone", "Retention God",
            "Analog Horror Clip", "Distortion Pedal", "Amen Break Pack", "Bass Boost", "Synths for Success",
            "Nitro Type Gold", "Copper Golem Hoodie", "Purple Heart Cape", "Gaming Chair", "Dual Monitors",
            "Terming Gods X HQ", "Digital Safety Org", "Brand Ambassador", "Merch Drop", "Red Simple T-Shirt",
            "World Tour", "Stadium Show", "Billboard Hit", "Grammy Winner", "Internet Legend"
        ];

        const emojis = ["🖱️", "👆", "🎥", "🐱", "🥁", "💻", "🏢", "🪝", "👑", "🎙️", "💿", "🎵", "🎸", "🧱", "🎨", "🌐", "☁️", "🚀", "📈", "🔥", "📺", "📻", "🥁", "🔉", "🎹", "🏁", "🤖", "💜", "💺", "🖥️", "🛡️", "👮", "🤝", "👕", "🔴", "🌍", "🏟️", "📊", "🏆", "🌟"];

        const items = [];
        for(let i = 0; i < 40; i++) {
            items.push({
                name: names[i],
                type: i % 3 === 0 ? "click" : "rps",
                cost: Math.floor(15 * Math.pow(1.55, i)),
                boost: Math.floor(1 * Math.pow(1.45, i)),
                emoji: emojis[i]
            });
        }

        function getMultiplier() {
            return Math.pow(2, rebirths);
        }

        function getRebirthCost() {
            return 1000000 * Math.pow(10, rebirths);
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '<h3 style="text-align:center; margin-top:0;">REDE SHOP 🛒</h3>';
            
            items.forEach((item, index) => {
                const canSee = score >= (item.cost * 0.70) || index < 3;
                if (canSee) {
                    const btn = document.createElement('div');
                    const affordable = score >= item.cost;
                    btn.className = `shop-item ${!affordable ? 'locked' : ''}`;
                    btn.innerHTML = `
                        <h4>${item.emoji} ${item.name}</h4>
                        <p>Cost: ${Math.floor(item.cost).toLocaleString()} | +${item.boost} ${item.type.toUpperCase()}</p>
                    `;
                    btn.onclick = (e) => { e.stopPropagation(); buyItem(index); };
                    container.appendChild(btn);
                }
            });
        }

        function buyItem(idx) {
            const item = items[idx];
            if (score >= item.cost) {
                score -= item.cost;
                if (item.type === 'click') pwr += item.boost;
                else rps += item.boost;
                item.cost *= 1.35; 
                save();
                renderShop();
            }
        }

        function attemptRebirth() {
            const cost = getRebirthCost();
            if (score >= cost) {
                if (confirm(`Rebirth for ${Math.pow(2, rebirths + 1)}x Multiplier? (Resets score and upgrades)`)) {
                    rebirths++;
                    score = 0;
                    pwr = 1;
                    rps = 0;
                    // Reset item costs
                    items.forEach((item, i) => {
                        item.cost = Math.floor(15 * Math.pow(1.55, i));
                    });
                    localStorage.setItem('r_rebirths', rebirths);
                    save();
                    renderShop();
                }
            } else {
                alert(`You need ${cost.toLocaleString()} Rede to Rebirth!`);
            }
        }

        function save() {
            const mult = getMultiplier();
            localStorage.setItem('r_score', score);
            localStorage.setItem('r_pwr', pwr);
            localStorage.setItem('r_rps', rps);
            
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('rps').innerText = `REDE PER SECOND: ${(rps * mult).toFixed(1)}`;
            document.getElementById('click-strength').innerText = `CLICK STRENGTH: ${Math.floor(pwr * mult).toLocaleString()}`;
            
            const rBtn = document.getElementById('rebirth-btn');
            const rCost = getRebirthCost();
            rBtn.innerText = `Rebirth (${rebirths})`;
            document.getElementById('rebirth-cost').innerText = `Cost: ${rCost.toLocaleString()}`;
            
            if (score >= rCost) rBtn.classList.add('ready');
            else rBtn.classList.remove('ready');
        }

        // Main Loop
        setInterval(() => {
            if (score > lastSafeScore + 50000000) { // Scaled anti-cheat for high levels
                score = parseFloat(localStorage.getItem('r_score')) || 0;
                console.warn("Integrity check reset.");
            }
            score += (rps * getMultiplier()) / 10;
            save();
            lastSafeScore = score;
        }, 100);

        setInterval(renderShop, 2000);

        const mascot = document.getElementById('clicker-btn');
        mascot.onclick = () => {
            score += (pwr * getMultiplier());
            save();
            mascot.classList.remove('spinning');
            void mascot.offsetWidth;
            mascot.classList.add('spinning');
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
        renderShop();
        save();
    </script>
</body>
</html>
