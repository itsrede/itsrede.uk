<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsRede Clicker</title>
    <style>
        :root {
            --rede-red: #ff0000;
            --rede-blue: #4d94ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
            color: white;
        }

        /* Moving Diagonal Background from image_db483a.png */
        .game-area {
            flex-grow: 1;
            background: repeating-linear-gradient(
                45deg,
                var(--rede-red),
                var(--rede-red) 60px,
                var(--rede-blue) 60px,
                var(--rede-blue) 120px
            );
            background-size: 200% 200%;
            animation: moveBg 15s linear infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* Top HUD */
        .header {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            text-align: center;
            border-bottom: 4px solid #333;
            z-index: 20;
        }
        #score { font-size: 42px; font-weight: bold; margin: 0; }
        #rps { font-size: 16px; color: var(--rede-red); text-transform: uppercase; letter-spacing: 1px; }

        /* Left Side Labels from image_db483a.png */
        .left-labels {
            position: absolute;
            left: 30px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 150px;
            z-index: 10;
        }
        .label-text {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 4px 4px 0px #000;
            opacity: 0.8;
        }

        /* Center Clicker */
        .clicker-container {
            position: relative;
            z-index: 5;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #clicker-btn {
            width: 250px;
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            transition: 0.1s;
        }
        .spin { animation: spinClick 0.5s ease-out; }
        @keyframes spinClick {
            0% { transform: rotate(0deg) scale(0.8); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Right Scrollable Shop */
        .shop-container {
            position: absolute;
            right: 20px;
            top: 80px;
            bottom: 20px;
            width: 220px;
            background: rgba(0,0,0,0.7);
            border: 4px solid white;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 30;
        }

        /* Gradient Moving Buttons */
        .shop-item {
            background: linear-gradient(270deg, #ff0000, #000, #4d94ff);
            background-size: 400% 400%;
            animation: gradMove 3s infinite;
            border: 2px solid white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        @keyframes gradMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shop-item:hover { transform: scale(1.05); }
        .shop-item h4 { margin: 0; font-size: 14px; }
        .shop-item p { margin: 5px 0 0; font-size: 12px; color: #ffeb3b; font-weight: bold; }

        /* Floating Points */
        .floating-point {
            position: absolute;
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s forwards;
            text-shadow: 2px 2px #000;
        }
        @keyframes floatUp {
            to { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="score">0</div>
        <div id="rps">Rede per second: 0</div>
    </div>

    <div class="game-area">
        <div class="left-labels">
            <div class="label-text">Background 🎨</div>
            <div class="label-text" onclick="alert('Enter Code: REDE2026')">Codes 🔑</div>
            <div class="label-text">Music (WIP) 🎵</div>
        </div>

        <div class="clicker-container">
            <img src="/favicon.png" id="clicker-btn" alt="Rede Mascot">
        </div>

        <div class="shop-container">
            <h3 style="text-align:center; margin-top:0;">SHOP 🛒</h3>
            
            <div class="shop-item" onclick="buy('click')">
                <h4>🖱️ Super Click</h4>
                <p id="cost-click">Cost: 15</p>
            </div>

            <div class="shop-item" onclick="buy('shorts')">
                <h4>🎥 Shorts Bot</h4>
                <p id="cost-shorts">Cost: 100</p>
            </div>

            <div class="shop-item" onclick="buy('breakcore')">
                <h4>🥁 Breakcore Loop</h4>
                <p id="cost-breakcore">Cost: 500</p>
            </div>

            <div class="shop-item" onclick="buy('records')">
                <h4>🏢 Rede Records</h4>
                <p id="cost-records">Cost: 2500</p>
            </div>

            <div class="shop-item" onclick="buy('crown')">
                <h4>👑 King's Crown</h4>
                <p id="cost-crown">Cost: 10000</p>
            </div>
            
            <div style="text-align:center; font-size:10px; margin-top:10px; color:#aaa;">Scroll for more ⬇️</div>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('rede_score')) || 0;
        let power = parseInt(localStorage.getItem('rede_power')) || 1;
        let auto = parseInt(localStorage.getItem('rede_auto')) || 0;

        const costs = {
            click: 15,
            shorts: 100,
            breakcore: 500,
            records: 2500,
            crown: 10000
        };

        const scoreEl = document.getElementById('score');
        const rpsEl = document.getElementById('rps');
        const btn = document.getElementById('clicker-btn');

        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            rpsEl.innerText = `Rede per second: ${auto}`;
            document.getElementById('cost-click').innerText = `Cost: ${Math.floor(costs.click * Math.pow(1.5, power - 1))}`;
            document.getElementById('cost-shorts').innerText = `Cost: ${Math.floor(costs.shorts * Math.pow(1.2, auto))}`;
            // (Repeat logic for other items as needed)
            
            localStorage.setItem('rede_score', score);
            localStorage.setItem('rede_power', power);
            localStorage.setItem('rede_auto', auto);
        }

        btn.addEventListener('click', (e) => {
            score += power;
            btn.classList.remove('spin');
            void btn.offsetWidth;
            btn.classList.add('spin');
            
            const p = document.createElement('div');
            p.className = 'floating-point';
            p.innerText = `+${power}`;
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            
            updateUI();
        });

        function buy(type) {
            let costKey = type;
            let currentCost = type === 'click' ? 
                Math.floor(costs.click * Math.pow(1.5, power - 1)) : 
                Math.floor(costs[type] * Math.pow(1.2, auto));

            if (score >= currentCost) {
                score -= currentCost;
                if (type === 'click') power++;
                else auto += (type === 'shorts' ? 1 : type === 'breakcore' ? 5 : type === 'records' ? 25 : 100);
                updateUI();
            }
        }

        setInterval(() => {
            if (auto > 0) {
                score += (auto / 10);
                updateUI();
            }
        }, 100);

        updateUI();
    </script>
</body>
</html>
