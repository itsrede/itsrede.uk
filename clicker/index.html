<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsRede Clicker Game</title>
    
    <link rel="icon" type="image/jpeg" href="RedeClickerFavion.jpg">
    
    <meta property="og:title" content="ItsRede Clicker">
    <meta property="og:description" content="Official Clicker Game By ItsRede.">
    <meta property="og:image" content="https://itsrede.uk/ItsRedeEmbedClicker.jpg">
    <meta name="theme-color" content="#ff0000">

    <style>
        :root { --rede-red: #ff0000; --rede-blue: #4d94ff; --rede-gold: #ffd700; }
        body { margin: 0; font-family: 'Comic Sans MS', cursive; overflow: hidden; height: 100vh; background: #000; color: white; user-select: none; }

        .game-area {
            flex-grow: 1; height: 100vh;
            background: repeating-linear-gradient(45deg, var(--rede-red), var(--rede-red) 60px, var(--rede-blue) 60px, var(--rede-blue) 120px);
            background-size: 200% 200%; animation: moveBg 15s linear infinite;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        @keyframes moveBg { 0% { background-position: 0 0; } 100% { background-position: 100% 100%; } }

        .header { 
            position: absolute; top: 0; width: 100%; background: rgba(15, 15, 15, 0.95); 
            padding: 2px 0; text-align: center; border-bottom: 2px solid var(--rede-gold); z-index: 100; 
        }
        #score { font-size: 36px; margin: 0; font-weight: bold; text-shadow: 2px 2px #000; line-height: 1; }
        .stats-row { display: flex; justify-content: center; gap: 15px; margin-top: 0; }

        .left-menu { position: absolute; left: 20px; top: 80px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .menu-btn { 
            background: white; color: black; border: 3px solid black; padding: 8px 15px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; 
            box-shadow: 3px 3px 0px #000;
        }

        .shop {
            position: absolute; right: 20px; top: 80px; bottom: 30px; width: 280px;
            background: rgba(0,0,0,0.9); border: 3px solid white; border-radius: 15px;
            padding: 15px; overflow-y: auto; z-index: 50;
        }

        /* Mascot Icon: Reverted to Default */
        #clicker-btn { 
            width: 260px; height: 260px; cursor: pointer; z-index: 10; 
            transition: transform 0.1s; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            object-fit: contain;
        }
        #clicker-btn:active { transform: scale(0.92); }

        .spinning { animation: spinMascot 0.4s ease-out; }
        @keyframes spinMascot {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.15) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="title-flex">NEWGEN</div>
        <div id="score">0</div>
        <div class="stats-row">
            <div id="click-strength" style="color:#00ff00; font-size:12px;">CLICK: 1</div>
            <div id="rps" style="color:var(--rede-red); font-size:12px;">RPS: 0.0</div>
        </div>
    </div>

    <div class="game-area">
        <div class="left-menu">
            <div class="menu-btn">Game Info ℹ️</div>
        </div>

        <img src="https://itsrede.uk/favicon.png" id="clicker-btn" alt="Rede Mascot">

        <div class="shop" id="shop-container">
            <h3 style="text-align:center; margin-top:0;">REDE SHOP 🛒</h3>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('r_score')) || 0;
        let pwr = parseInt(localStorage.getItem('r_pwr')) || 1;
        let rps = parseFloat(localStorage.getItem('r_rps')) || 0;
        let rebirths = parseInt(localStorage.getItem('r_rebirths')) || 0;

        function save() {
            const mult = Math.pow(2, rebirths);
            localStorage.setItem('r_score', score);
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('rps').innerText = `RPS: ${(rps * mult).toFixed(1)}`;
            document.getElementById('click-strength').innerText = `CLICK: ${Math.floor(pwr * mult).toLocaleString()}`;
        }

        setInterval(() => { score += (rps * Math.pow(2, rebirths)) / 10; save(); }, 100);
        
        const mascot = document.getElementById('clicker-btn');
        mascot.onclick = () => {
            score += (pwr * Math.pow(2, rebirths));
            save();
            mascot.classList.remove('spinning');
            void mascot.offsetWidth;
            mascot.classList.add('spinning');
        };

        save();
    </script>
</body>
</html>
